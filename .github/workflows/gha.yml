name: Moodle Plugin CI

on: [push, pull_request]

jobs:
   ci:
    uses: catalyst/catalyst-moodle-workflows/.github/workflows/ci.yml@main
    with:
      # TODO: remove once catalyst fixes the snapshot image.
      # The snapshot's pre-generated behat.yml lacks the 'chrome' profile
      # because moodle-plugin-ci init ran inside Docker without Selenium
      # available. The catalyst workflow hard-codes --profile chrome and
      # provides no input to change it, so behat cannot run until the
      # snapshot is rebuilt with Chrome/Selenium present during init.
      # Report: https://github.com/catalyst/catalyst-moodle-workflows/issues
      disable_behat: true