name: ci

on: [push, pull_request]

jobs:
  # Single reusable-workflow call: the Moodle core branch is auto-detected
  # from this plugin branch's name (MOODLE_501_STABLE). On `main` this file
  # instead makes one call per supported core branch — keep each branch's
  # own form when resolving cherry-picks.
  ci:
    uses: moodle-an-hochschulen/moodle-workflows/.github/workflows/moodle-plugin-ci.yml@main
